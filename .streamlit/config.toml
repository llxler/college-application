[theme]
base = "light"
primaryColor = "#B5473C"
backgroundColor = "#F7F8FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#17212B"
redColor = "#C2413B"
orangeColor = "#B86A23"
blueColor = "#2F6B91"
greenColor = "#357A58"
grayColor = "#667085"
linkColor = "#2F6B91"
font = "sans-serif"
baseFontSize = 16
baseFontWeight = 400
metricValueFontSize = "2rem"
metricValueFontWeight = 600
headingFont = "sans-serif"
headingFontSizes = ["2rem", "1.5rem", "1.25rem"]
headingFontWeights = [700, 600, 600]
baseRadius = "0.375rem"
buttonRadius = "0.375rem"
borderColor = "#D8DEE8"
dataframeBorderColor = "#CBD3DF"
dataframeHeaderBackgroundColor = "#EEF2F6"
showWidgetBorder = true
showSidebarBorder = true

[theme.sidebar]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FA"
borderColor = "#D8DEE8"
